<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>스시도감</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="contents">
        
        <header class="header">
            <div class="title-wrap">
                <div class="title-box">
                    <h1>すし図鑑</h1>
                </div>
                <div class="reading">
                    <span>스</span>
                    <span>시</span>
                    <span>도</span>
                    <span>감</span>
                </div>
            </div>
        </header>

        <div class="search-area">
            <div class="search-box">
                <input type="text" placeholder="">
                <button type="button">
					<svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
					    <circle cx="11" cy="11" r="8"></circle>
					    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
					</svg>
                </button>
            </div>
        </div>

        <main class="sushi-grid">

<!-- 붉은살 -->

            <div class="sushi-item">
                <div class="img-box">
                    <img src="images/tyuutoro.png" alt="츄토로">
                </div>
                <p class="sub-name">츄토로</p>
                <h2 class="jp-name">中とろ</h2>
            </div>

            <div class="sushi-item">
                <div class="img-box">
                    <img src="images/ootoro.png" alt="오토로">
                </div>
                <p class="sub-name">오토로</p>
                <h2 class="jp-name">大とろ</h2>
            </div>
<!-- 흰살 -->
            <div class="sushi-item">
                <div class="img-box">
                    <img src="images/hirame.png" alt="광어">
                </div>
                <p class="sub-name">광어</p>
                <h2 class="jp-name">平目</h2>
            </div>
<!-- 새우 -->
           
            <div class="sushi-item">
                <div class="img-box">
                    <img src="images/botanebi.png" alt="보탄새우">
                </div>
                <p class="sub-name">보탄새우</p>
                <h2 class="jp-name">牡丹海老</h2>
            </div>

            <div class="sushi-item">
                <div class="img-box">
                    <img src="images/amaebi.png" alt="단새우">
                </div>
                <p class="sub-name">단새우</p>
                <h2 class="jp-name">甘海老</h2>
            </div>

            <div class="sushi-item">
                <div class="img-box">
                    <img src="images/kurumaebi.png" alt="차새우">
                </div>
                <p class="sub-name">보리새우</p>
                <h2 class="jp-name">車海老</h2>
            </div>

            <div class="sushi-item">
                <div class="img-box">
                	<img src="images/budouebi.png" alt="포도새우">
                </div>
                <p class="sub-name">포도새우</p>
                <h2 class="jp-name">ブドウ海老</h2>
            </div>

            <div class="sushi-item">
                <div class="img-box">
                	<img src="images/morotogeakaebi.png" alt="물렁가시붉은새우">
                </div>
                <p class="sub-name">물렁가시붉은새우(꽃새우)</p>
                <h2 class="jp-name">モロトゲアカ海老</h2>
            </div>
            
            <div class="sushi-item">
                <div class="img-box"></div>
                <p class="sub-name">단새우</p>
                <h2 class="jp-name">甘海老</h2>
            </div>

            <div class="sushi-item">
                <div class="img-box">
                    <img src="images/siroebi.png" alt="흰돗대기새우">
                </div>
                <p class="sub-name">흰돗대기새우</p>
                <h2 class="jp-name">白海老</h2>
            </div>            

        </main>

    </div>
</body>
</html>
